function taskToRow(t){return{name:t.name,assignees:t.assignees,priority:t.priority,status:t.status,deadline:t.deadline,category:t.category,notes:t.notes,progress:t.progress,effort:t.effort,links:t.links,comments:t.comments,subtasks:t.subtasks,milestone_id:t.milestoneId};}
function rowToMilestone(r){return{id:r.id,name:r.name||"",deadline:r.deadline||today,description:r.description||"",closed:r.closed||false};}

// ── EMAILJS ────────────────────────────────────────────────────
// ── CONTROL DE NOTIFICACIONES (anti-duplicados) ────────────────
// Usa una variable en memoria con clave por tarea+tipo+fecha
const _notifSent = {};
function notifKey(taskId, type) {
  return `${taskId}_${type}_${today}`;
}
function alreadySent(taskId, type) {
  return !!_notifSent[notifKey(taskId, type)];
}
function markSent(taskId, type) {
  _notifSent[notifKey(taskId, type)] = true;
}

async function sendEmail(to_email,to_name,subject,message){
  if(EMAILJS_PUBLIC_KEY==="TU_PUBLIC_KEY"){console.log("EmailJS pendiente → ",to_email,subject);return;}
  try{await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
    email: to_email,
    name:  to_name,
    title: subject,
    message,
  },EMAILJS_PUBLIC_KEY);}
  catch(e){console.error("EmailJS:",e);}
}
async function notifyAssigned(task){
  if(alreadySent(task.id,"assigned"))return;
  for(const n of task.assignees){
    const e=TEAM_EMAILS[n];
    if(e)await sendEmail(e,n,`📋 Nueva tarea: ${task.name}`,`Hola ${n},\n\nSe te asignó "${task.name}".\nPrioridad: ${task.priority} | Deadline: ${task.deadline}\n${task.notes?"\nNotas: "+task.notes:""}\n\nParque Tempisque – Eventos`);
  }
  markSent(task.id,"assigned");
}
async function notifyEdited(task){
  if(alreadySent(task.id,"edited"))return;
  for(const n of task.assignees){
    const e=TEAM_EMAILS[n];
    if(e)await sendEmail(e,n,`✏️ Tarea actualizada: ${task.name}`,`Hola ${n},\n\nLa tarea "${task.name}" fue modificada.\nEstado: ${task.status} | Avance: ${task.progress}% | Deadline: ${task.deadline}\n${task.notes?"\nNotas: "+task.notes:""}\n\nParque Tempisque – Eventos`);
  }
  markSent(task.id,"edited");
}
async function notifyMilestoneEdited(m){
  if(alreadySent(m.id,"milestone_edited"))return;
  for(const n of TEAM){
    const e=TEAM_EMAILS[n];
    if(e)await sendEmail(e,n,`🎯 Objetivo actualizado: ${m.name}`,`Hola ${n},\n\nEl objetivo "${m.name}" fue modificado.\nDeadline: ${m.deadline} | Estado: ${m.closed?"Cerrado":"Abierto"}\n${m.description?"\n"+m.description:""}\n\nParque Tempisque – Eventos`);
  }
  markSent(m.id,"milestone_edited");
}
async function notifyOverdue(task){
  const type=daysUntil(task.deadline)<0?"overdue":"upcoming";
  if(alreadySent(task.id,type))return;
  for(const n of task.assignees){
    const e=TEAM_EMAILS[n]; if(!e)continue;
    const d=daysUntil(task.deadline);
    await sendEmail(e,n,d<0?`⚠️ Tarea vencida: ${task.name}`:`🔔 Por vencer: ${task.name}`,`Hola ${n},\n\n${d<0?`"${task.name}" venció hace ${Math.abs(d)} día(s).`:`"${task.name}" vence en ${d} día(s) (${task.deadline}).`}\nEstado: ${task.status}\n\nParque Tempisque – Eventos`);
  }
  markSent(task.id,type);
}

  useEffect(()=>{const t=setTimeout(onDone,3500);return()=>clearTimeout(t);},[]);

}

// ── GRÁFICA ESFUERZO SVG ───────────────────────────────────────
function EsfuerzoChart({tasks}){
  const [tip,setTip]=useState(null);
  const SEGS=["Sin Iniciar","En Curso","Atrasada","Completado"];
  const COLORS={"Sin Iniciar":"#94a3b8","En Curso":"#3b82f6","Atrasada":"#ef4444","Completado":"#22c55e"};
  const data=TEAM.map(name=>{
    const mine=tasks.filter(t=>t.assignees.includes(name));
    return{name,
      "Sin Iniciar":mine.filter(t=>t.status==="Pendiente"&&!isOverdue(t.deadline,t.status)).reduce((a,t)=>a+t.effort,0),
      "En Curso":   mine.filter(t=>t.status==="En progreso"&&!isOverdue(t.deadline,t.status)).reduce((a,t)=>a+t.effort,0),
      "Atrasada":   mine.filter(t=>isOverdue(t.deadline,t.status)).reduce((a,t)=>a+t.effort,0),
      "Completado": mine.filter(t=>t.status==="Listo").reduce((a,t)=>a+t.effort,0),
    };
  });
  const W=540,H=200,pL=36,pB=28,pT=10,pR=16;
  const cW=W-pL-pR, cH=H-pB-pT;
  const maxV=Math.max(...data.map(d=>SEGS.reduce((a,k)=>a+d[k],0)),1);
  const bW=Math.floor(cW/data.length*0.52);
  const gap=cW/data.length;
  return(
    <div style={{background:"white",borderRadius:16,padding:"20px 20px 12px",border:"1px solid #c7d2fe",marginBottom:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:BLUE_DARK}}>📊 Esfuerzo por persona <span style={{fontSize:11,color:"#9ca3af",fontWeight:400}}>(pts por estado)</span></h3>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
        <defs><filter id="shd"><feDropShadow dx="0" dy="1" stdDeviation="2" floodOpacity="0.12"/></filter></defs>
        {[0,1,2,3,4].map(i=>{const y=pT+(cH/4)*i;return <g key={i}><line x1={pL} x2={W-pR} y1={y} y2={y} stroke="#e2e8f0" strokeWidth="1"/><text x={pL-4} y={y+4} textAnchor="end" fontSize="9" fill="#9ca3af">{Math.round(maxV*(1-i/4))}</text></g>;})}
        {data.map((d,i)=>{
          const cx=pL+gap*i+gap/2, x=cx-bW/2;
          let cy=pT+cH;
          return(
            <g key={d.name} onMouseEnter={()=>setTip({cx,d})} onMouseLeave={()=>setTip(null)} style={{cursor:"pointer"}}>
              {SEGS.map(seg=>{
                const h=(d[seg]/maxV)*cH; if(!h)return null;
                cy-=h;
                const isTop=SEGS.slice(SEGS.indexOf(seg)+1).every(s=>!d[s]);
                return <rect key={seg} x={x} y={cy} width={bW} height={h} fill={COLORS[seg]} rx={isTop?3:0}/>;
              })}
              <text x={cx} y={pT+cH+16} textAnchor="middle" fontSize="11" fill="#374151" fontWeight="600">{d.name}</text>
            </g>
          );
        })}
        {tip&&(()=>{
          const {cx,d}=tip; const vals=SEGS.filter(s=>d[s]>0);
          const tw=118,th=vals.length*16+22,tx=cx+bW/2+4>W-tw?cx-tw-bW/2-4:cx+bW/2+4,ty=pT+20;
          return <g>
            <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="white" stroke="#c7d2fe" strokeWidth="1" filter="url(#shd)"/>
            <text x={tx+8} y={ty+14} fontSize="11" fontWeight="700" fill={BLUE_DARK}>{d.name}</text>
            {vals.map((s,i)=><g key={s}><rect x={tx+8} y={ty+20+i*16} width={8} height={8} rx="2" fill={COLORS[s]}/><text x={tx+20} y={ty+28+i*16} fontSize="10" fill="#374151">{s}: {d[s]} pts</text></g>)}
          </g>;
        })()}
      </svg>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:4,justifyContent:"center"}}>
        {SEGS.map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#374151"}}><div style={{width:12,height:12,borderRadius:3,background:COLORS[s]}}/>{s}</div>)}
      </div>
    </div>
  );
}

  const tabs=[{k:"info",l:"ℹ️ Info"},{k:"sub",l:`✅ (${task.subtasks.length})`},{k:"com",l:`💬 (${task.comments.length})`},{k:"lnk",l:`📎 (${task.links.length})`}];
  const upd=onUpdate;
  function addCom(){if(!nc.trim())return;upd({...task,comments:[...task.comments,{id:Date.now(),author:"Andy",text:nc,date:today}]});setNc("");}
  function addLnk(){if(!nlu.trim())return;upd({...task,links:[...task.links,{id:Date.now(),label:nll||nlu,url:nlu}]});setNll("");setNlu("");}
  function addSub(){if(!ns.trim())return;upd({...task,subtasks:[...task.subtasks,{id:Date.now(),text:ns,done:false}]});setNs("");}
  function togSub(id){const s=task.subtasks.map(x=>x.id===id?{...x,done:!x.done}:x);const d=s.filter(x=>x.done).length;upd({...task,subtasks:s,progress:s.length>0?Math.round(d/s.length*100):task.progress});}
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.55)"}}>
      <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",border:"2px solid #c7d2fe"}}>
        <div style={{background:BLUE_DARK,padding:"16px 20px",borderRadius:"14px 14px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:700,letterSpacing:2,color:"#a5b4fc",textTransform:"uppercase"}}>Parque Tempisque · Eventos</p>
              <h2 style={{margin:"4px 0",color:"white",fontSize:18,fontWeight:800}}>{task.name}</h2>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                <Badge label={task.status} style={STATUS_STYLE[task.status]}/>
                <Badge label={task.priority} style={PRIORITY_STYLE[task.priority]}/>
                <Badge label={task.category} style={CATEGORY_STYLE[task.category]}/>
                <span style={{fontSize:11,background:"#e0e7ff",color:BLUE_DARK,borderRadius:10,padding:"1px 8px",fontWeight:700}}>⚡ {task.effort} pts</span>
              </div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer"}}>✕</button>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid #c7d2fe"}}>
          {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"10px 4px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:tab===t.k?BLUE_LIGHT:"white",color:tab===t.k?BLUE_DARK:"#94a3b8",borderBottom:tab===t.k?`2px solid ${BLUE_MID}`:"2px solid transparent"}}>{t.l}</button>)}
        </div>
        <div style={{padding:20}}>
          {tab==="info"&&<div>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:BLUE_DARK,marginBottom:4}}><span>Avance</span><span style={{fontWeight:700}}>{task.progress}%</span></div>
              <div style={{background:"#e2e8f0",borderRadius:6,height:8}}><div style={{height:8,borderRadius:6,background:task.progress===100?BLUE_MID:task.progress>=50?"#059669":"#f59e0b",width:`${task.progress}%`,transition:"width 0.3s"}}/></div>
              <input type="range" min={0} max={100} value={task.progress} onChange={e=>upd({...task,progress:+e.target.value})} style={{width:"100%",marginTop:6,accentColor:BLUE_MID}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><p style={{fontSize:11,color:"#9ca3af",margin:"0 0 4px"}}>Deadline</p><p style={{fontSize:13,fontWeight:600,color:"#1f2937",margin:0}}>{task.deadline}{isOverdue(task.deadline,task.status)&&<span style={{color:"#ef4444",fontSize:11,marginLeft:6}}>⚠️</span>}</p></div>
              <div><p style={{fontSize:11,color:"#9ca3af",margin:"0 0 4px"}}>Participantes</p><AvatarGroup assignees={task.assignees}/></div>

          </div>}
          {tab==="sub"&&<div>
            {task.subtasks.length===0&&<p style={{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"16px 0"}}>No hay subtareas aún</p>}
            {task.subtasks.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:10,background:BLUE_LIGHT,borderRadius:10,padding:"8px 12px",marginBottom:8}}>

              </div>
              <p style={{margin:0,fontSize:13,color:"#374151",paddingLeft:28}}>{c.text}</p>
            </div>)}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCom()} placeholder="Agregar comentario..." style={iS}/>
              <button onClick={addCom} style={{background:BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+ Agregar</button>
            </div>

          {tab==="lnk"&&<div>
            {task.links.length===0&&<p style={{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"16px 0"}}>No hay links</p>}
            {task.links.map(l=><div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:BLUE_LIGHT,borderRadius:10,padding:"8px 14px",marginBottom:8}}>
              <a href={l.url} target="_blank" rel="noreferrer" style={{fontSize:13,fontWeight:600,color:BLUE_DARK,textDecoration:"none"}}>📎 {l.label}</a>
              <button onClick={()=>upd({...task,links:task.links.filter(x=>x.id!==l.id)})} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer"}}>✕</button>
            </div>)}
            <input value={nll} onChange={e=>setNll(e.target.value)} placeholder="Etiqueta" style={iS}/>
            <input value={nlu} onChange={e=>setNlu(e.target.value)} placeholder="URL (https://...)" style={{...iS,marginTop:8}}/>
            <button onClick={addLnk} style={{background:BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8}}>+ Adjuntar</button>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ── MILESTONES PANEL ───────────────────────────────────────────
function MilestonesPanel({milestones,tasks,onAdd,onToggle,onDelete}){
  const [form,setForm]=useState(EMPTY_MILESTONE);
  const [show,setShow]=useState(false);
  const iS={width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4};
  function handleAdd(){if(!form.name.trim())return;onAdd(form);setForm(EMPTY_MILESTONE);setShow(false);}
  return(
    <div style={{background:"white",borderRadius:16,padding:20,border:"1px solid #c7d2fe",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{margin:0,fontSize:14,fontWeight:700,color:BLUE_DARK}}>🎯 Proyectos / Objetivos</h3>
        <button onClick={()=>setShow(s=>!s)} style={{background:BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nuevo</button>
      </div>
      {show&&<div style={{background:BLUE_LIGHT,borderRadius:12,padding:16,marginBottom:12}}>
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nombre del objetivo *" style={iS}/>
        <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Descripción (opcional)" style={{...iS,marginTop:8}}/>
        <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} style={{...iS,marginTop:8}}/>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={handleAdd} style={{background:BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"7px 20px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Agregar</button>
          <button onClick={()=>setShow(false)} style={{background:"white",color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer"}}>Cancelar</button>
        </div>
      </div>}
      {milestones.length===0&&<p style={{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"12px 0"}}>No hay objetivos definidos aún</p>}
      {milestones.map(m=>{
        const mt=tasks.filter(t=>String(t.milestoneId)===String(m.id));
        const done=mt.filter(t=>t.status==="Listo").length;
        const pct=mt.length?Math.round(done/mt.length*100):0;
        const avg=mt.length?Math.round(mt.reduce((a,t)=>a+t.progress,0)/mt.length):0;
        return(
          <div key={m.id} style={{border:`1.5px solid ${m.closed?"#bbf7d0":"#c7d2fe"}`,borderRadius:12,padding:"12px 16px",marginBottom:8,background:m.closed?"#f0fdf4":BLUE_LIGHT}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:14,color:m.closed?"#15803d":BLUE_DARK}}>{m.closed?"✅ ":""}{m.name}</span>
                  {m.closed&&<span style={{fontSize:11,background:"#bbf7d0",color:"#15803d",borderRadius:10,padding:"1px 8px",fontWeight:700}}>Cerrado</span>}
                  <span style={{fontSize:11,color:"#9ca3af"}}>📅 {m.deadline}</span>
                </div>
                {m.description&&<p style={{margin:"4px 0 0",fontSize:12,color:"#6b7280"}}>{m.description}</p>}
                <div style={{marginTop:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:BLUE_DARK,marginBottom:3}}><span>Tareas: {done}/{mt.length}</span><span style={{fontWeight:700}}>Avance prom. {avg}%</span></div>
                  <div style={{background:"#e2e8f0",borderRadius:6,height:7}}><div style={{height:7,borderRadius:6,background:pct===100?"#22c55e":pct>=50?BLUE_MID:"#f59e0b",width:`${pct}%`,transition:"width 0.3s"}}/></div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>onToggle(m)} style={{background:m.closed?"#fef9c3":"#dcfce7",color:m.closed?"#854d0e":"#15803d",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{m.closed?"Reabrir":"✓ Cerrar"}</button>
                <button onClick={()=>onDelete(m.id)} style={{background:"#fee2e2",color:"#991b1b",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ══════════════════════════════════════════════════════════════
function App(){
  const [tasks,setTasks]=useState([]);
  const [milestones,setMilestones]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState(EMPTY_TASK);
  const [editId,setEditId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [fStatus,setFStatus]=useState("Todos");
  const [fAssignee,setFAssignee]=useState("Todos");
  const [fCat,setFCat]=useState("Todas");
  const [fMile,setFMile]=useState("Todos");
  const [view,setView]=useState("tabla");
  const [detailTask,setDetailTask]=useState(null);
  const [alertDays,setAlertDays]=useState(3);
  const [dbError,setDbError]=useState(null);

  function showT(msg,type="ok"){setToast({msg,type});}

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const [{data:td,error:te},{data:md,error:me}]=await Promise.all([
        sb.from("eventos_tasks").select("*").order("id",{ascending:true}),
        sb.from("eventos_milestones").select("*").order("id",{ascending:true}),
      ]);
      if(te)setDbError("Error: "+te.message+". Creá las tablas eventos_tasks y eventos_milestones en Supabase.");
      else setTasks(td.map(rowToTask));
      if(!me)setMilestones(md.map(rowToMilestone));
      setLoading(false);
    }
    load();
  },[]);

  async function saveTask(){
    if(!form.name.trim()){showT("El nombre es obligatorio","warn");return;}
    if(saving)return; setSaving(true);
    try{
      if(editId!==null){
        const u={...form,id:editId};
        const {error}=await sb.from("eventos_tasks").update(taskToRow(u)).eq("id",editId);
        if(error)throw error;
        setTasks(ts=>ts.map(t=>t.id===editId?u:t));
        if(detailTask?.id===editId)setDetailTask(u);
        await notifyEdited(u);
        showT("Tarea actualizada ✅"); setEditId(null);
      } else {
        const payload={id:Date.now(),...taskToRow(form)};
        const {data,error}=await sb.from("eventos_tasks").insert(payload).select().single();
        if(error)throw error;
        const nt=rowToTask(data); setTasks(ts=>[...ts,nt]);
        await notifyAssigned(nt);
        showT("Tarea creada ✅"+(EMAILJS_PUBLIC_KEY!=="TU_PUBLIC_KEY"?" · Notificaciones enviadas":""));
      }
      setForm(EMPTY_TASK); setShowForm(false);
    }catch(err){showT("Error: "+(err.message||JSON.stringify(err)),"err");}
    finally{setSaving(false);}
  }

  async function updateTask(u){
    setTasks(ts=>ts.map(t=>t.id===u.id?u:t)); setDetailTask(u);
    const {error}=await sb.from("eventos_tasks").upsert({id:u.id,...taskToRow(u)},{onConflict:"id"});
    if(error){showT("Error al guardar","err");return;} showT("Guardado ✅");
  }
  async function cycleStatus(id){const t=tasks.find(x=>x.id===id);if(t)await updateTask({...t,status:STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length]});}
  async function deleteTask(id){
    const {error}=await sb.from("eventos_tasks").delete().eq("id",id);
    if(error){showT("Error al eliminar","err");return;}
    setTasks(ts=>ts.filter(t=>t.id!==id)); if(detailTask?.id===id)setDetailTask(null); showT("Eliminado");
  }
  async function addMilestone(m){
    const payload={id:Date.now(),...milestoneToRow(m)};
    const {data,error}=await sb.from("eventos_milestones").insert(payload).select().single();
    if(error){showT("Error: "+error.message,"err");return;}
    setMilestones(ms=>[...ms,rowToMilestone(data)]); showT("Objetivo creado ✅");
  }
  async function toggleMilestone(m){
    const u={...m,closed:!m.closed};
    const {error}=await sb.from("eventos_milestones").update({closed:u.closed}).eq("id",m.id);
    if(error){showT("Error","err");return;}
    setMilestones(ms=>ms.map(x=>x.id===m.id?u:x));
    await notifyMilestoneEdited(u);
    showT(u.closed?"Objetivo cerrado ✅":"Objetivo reabierto");
  }
  async function deleteMilestone(id){
    const {error}=await sb.from("eventos_milestones").delete().eq("id",id);
    if(error){showT("Error","err");return;}
    setMilestones(ms=>ms.filter(m=>m.id!==id)); setTasks(ts=>ts.map(t=>t.milestoneId===id?{...t,milestoneId:null}:t)); showT("Eliminado");
  }

  useEffect(()=>{
    if(!tasks.length)return;
    tasks.forEach(t=>{if(t.status!=="Listo"&&daysUntil(t.deadline)<=alertDays)notifyOverdue(t);});
  },[alertDays]);

  function startEdit(t){setForm({...t, milestoneId: t.milestoneId ? String(t.milestoneId) : null});setEditId(t.id);setShowForm(true);}
  function togAssignee(n){setForm(f=>{const has=f.assignees.includes(n);if(has&&f.assignees.length===1)return f;return{...f,assignees:has?f.assignees.filter(a=>a!==n):[...f.assignees,n]};});}
  function togAll(){setForm(f=>f.assignees.length===TEAM.length?{...f,assignees:[TEAM[0]]}:{...f,assignees:[...TEAM]});}

  const stats=useMemo(()=>({total:tasks.length,pendiente:tasks.filter(t=>t.status==="Pendiente").length,progreso:tasks.filter(t=>t.status==="En progreso").length,listo:tasks.filter(t=>t.status==="Listo").length,vencidos:tasks.filter(t=>isOverdue(t.deadline,t.status)).length,avgProgress:tasks.length?Math.round(tasks.reduce((a,t)=>a+t.progress,0)/tasks.length):0}),[tasks]);
  const alerts=useMemo(()=>tasks.filter(t=>t.status!=="Listo"&&!isOverdue(t.deadline,t.status)&&daysUntil(t.deadline)<=alertDays),[tasks,alertDays]);
  const catStats=useMemo(()=>CATEGORIES.map(c=>({cat:c,count:tasks.filter(t=>t.category===c).length})).filter(x=>x.count>0),[tasks]);
  const filtered=useMemo(()=>tasks.filter(t=>(fStatus==="Todos"||t.status===fStatus)&&(fAssignee==="Todos"||t.assignees.includes(fAssignee))&&(fCat==="Todas"||t.category===fCat)&&(fMile==="Todos"||(fMile==="Sin objetivo"&&!t.milestoneId)||String(t.milestoneId)===fMile)),[tasks,fStatus,fAssignee,fCat,fMile]);

  const S={inp:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4},sel:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4}};
  const VIEWS=[{k:"tabla",l:"📋 Tabla"},{k:"esfuerzo",l:"📊 Esfuerzo"},{k:"milestones",l:"🎯 Objetivos"},{k:"resumen",l:"📄 Resumen"}];

  if(loading)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,background:BLUE_LIGHT}}><Logo size={64}/><p style={{color:BLUE_DARK,fontWeight:700,fontSize:15}}>Conectando con Supabase...</p></div>;

  return(
    <div style={{minHeight:"100vh",background:BLUE_LIGHT,fontFamily:"sans-serif"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {detailTask&&<DetailModal task={detailTask} onClose={()=>setDetailTask(null)} onUpdate={updateTask}/>}

      <div style={{background:BLUE_DARK,padding:"12px 24px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <Logo size={72}/>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:800,letterSpacing:3,color:"#a5b4fc",textTransform:"uppercase"}}>Parque Tempisque</p>
              <h1 style={{margin:0,fontSize:20,fontWeight:800,color:"white"}}>Dashboard Eventos</h1>
              <p style={{margin:0,fontSize:11,color:"#c7d2fe"}}>Control de tareas y objetivos</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:11,padding:"4px 12px",borderRadius:20,fontWeight:600,background:"rgba(255,255,255,0.1)",color:"#a8d5b5"}}>☁️ Supabase</div>
            <div style={{fontSize:11,padding:"4px 12px",borderRadius:20,fontWeight:600,background:EMAILJS_PUBLIC_KEY!=="TU_PUBLIC_KEY"?"rgba(26,92,46,0.4)":"rgba(251,191,36,0.2)",color:EMAILJS_PUBLIC_KEY!=="TU_PUBLIC_KEY"?"#a8d5b5":"#fcd34d"}}>📧 EmailJS {EMAILJS_PUBLIC_KEY!=="TU_PUBLIC_KEY"?"activo":"pendiente"}</div>
            <div style={{display:"flex",gap:4}}>
              {VIEWS.map(v=><button key={v.k} onClick={()=>setView(v.k)} style={{background:view===v.k?"white":"rgba(255,255,255,0.12)",color:view===v.k?BLUE_DARK:"white",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{v.l}</button>)}
            </div>
          </div>
        </div>
      </div>
      <div style={{height:4,background:`linear-gradient(90deg,#1a5c2e,#7cc47a,#1a5c2e)`}}/>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>
        {dbError&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"12px 16px",marginBottom:16,color:"#991b1b",fontSize:13}}>❌ {dbError}</div>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
          {[{l:"Total",v:stats.total,bg:BLUE_DARK},{l:"Pendientes",v:stats.pendiente,bg:"#64748b"},{l:"En progreso",v:stats.progreso,bg:"#2563eb"},{l:"Listos",v:stats.listo,bg:"#059669"},{l:"Avance prom.",v:`${stats.avgProgress}%`,bg:"#7c3aed"}].map(c=>(
            <div key={c.l} style={{background:c.bg,color:"white",borderRadius:12,padding:"12px 8px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>
              <div style={{fontSize:26,fontWeight:800}}>{c.v}</div>
              <div style={{fontSize:11,opacity:.85,marginTop:2}}>{c.l}</div>
            </div>
          ))}
        </div>

        {alerts.length>0&&<div style={{background:"#fefce8",border:"1px solid #fbbf24",borderRadius:12,padding:"10px 16px",marginBottom:12}}>
          <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:"#92400e"}}>🔔 Vencen en los próximos <select value={alertDays} onChange={e=>setAlertDays(+e.target.value)} style={{border:"1px solid #fbbf24",borderRadius:4,padding:"1px 4px",fontSize:12,margin:"0 4px"}}>{[1,2,3,5,7].map(d=><option key={d} value={d}>{d} días</option>)}</select></p>
          {alerts.map(t=><p key={t.id} style={{margin:"2px 0 0 8px",fontSize:12,color:"#b45309"}}>• <b>{t.name}</b> — {t.deadline} ({daysUntil(t.deadline)}d)</p>)}
        </div>}
        {stats.vencidos>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"10px 16px",marginBottom:12,color:"#991b1b",fontSize:13}}>⚠️ <b>{stats.vencidos}</b> tarea(s) con deadline vencido</div>}

        {catStats.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:12,fontWeight:700,color:BLUE_DARK}}>Categorías:</span>
          {catStats.map(x=><button key={x.cat} onClick={()=>setFCat(fCat===x.cat?"Todas":x.cat)} className={CATEGORY_STYLE[x.cat]} style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20,cursor:"pointer",outline:fCat===x.cat?`2px solid ${BLUE_MID}`:"none",outlineOffset:2}}>{x.cat} <span style={{background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"0 5px"}}>{x.count}</span></button>)}
          {fCat!=="Todas"&&<button onClick={()=>setFCat("Todas")} style={{fontSize:12,color:BLUE_MID,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>limpiar</button>}
        </div>}

        {/* ── TABLA ── */}
        {view==="tabla"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[{v:fStatus,s:setFStatus,o:["Todos",...STATUSES]},{v:fAssignee,s:setFAssignee,o:["Todos",...TEAM]},{v:fCat,s:setFCat,o:["Todas",...CATEGORIES]}].map((f,i)=>(
                <select key={i} value={f.v} onChange={e=>f.s(e.target.value)} style={{fontSize:12,border:"1px solid #c7d2fe",borderRadius:8,padding:"6px 10px",background:"white"}}>{f.o.map(o=><option key={o}>{o}</option>)}</select>
              ))}
              <select value={fMile} onChange={e=>setFMile(e.target.value)} style={{fontSize:12,border:"1px solid #c7d2fe",borderRadius:8,padding:"6px 10px",background:"white"}}>
                <option value="Todos">Todos los objetivos</option>
                <option value="Sin objetivo">Sin objetivo</option>
                {milestones.map(m=><option key={m.id} value={String(m.id)}>{m.name}</option>)}
              </select>
            </div>
            <button onClick={()=>{setForm(EMPTY_TASK);setEditId(null);setShowForm(true);}} style={{background:BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nueva tarea</button>
          </div>

          {showForm&&<div style={{background:"white",border:"1px solid #c7d2fe",borderRadius:16,padding:20,marginBottom:16}}>
            <h3 style={{margin:"0 0 14px",color:BLUE_DARK}}>{editId?"✏️ Editar tarea":"➕ Nueva tarea"}</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Nombre *</label>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveTask()} style={{...S.inp,border:form.name.trim()?"1px solid #e5e7eb":"1px solid #fca5a5"}} placeholder="Ej. Cotizar catering" autoFocus/>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:11,color:"#6b7280",fontWeight:600,display:"block",marginBottom:8}}>Participantes</label>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={togAll} style={{background:form.assignees.length===TEAM.length?BLUE_MID:BLUE_LIGHT,color:form.assignees.length===TEAM.length?"white":BLUE_DARK,border:"1px solid #c7d2fe",borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🎪 Todo el equipo</button>
                  {TEAM.map(n=>{const sel=form.assignees.includes(n);return<button key={n} onClick={()=>togAssignee(n)} style={{background:sel?BLUE_MID:"white",color:sel?"white":BLUE_DARK,border:`1px solid ${sel?BLUE_MID:"#c7d2fe"}`,borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><Avatar name={n} size={16}/>{n}</button>;})}
                </div>
              </div>
              {[{l:"Categoría",k:"category",o:CATEGORIES},{l:"Prioridad",k:"priority",o:PRIORITIES},{l:"Estado",k:"status",o:STATUSES}].map(f=>(
                <div key={f.k}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>{f.l}</label><select value={form[f.k]} onChange={e=>setForm(ff=>({...ff,[f.k]:e.target.value}))} style={S.sel}>{f.o.map(o=><option key={o}>{o}</option>)}</select></div>
              ))}
              <div><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Deadline</label><input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} style={S.inp}/></div>
              <div><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Objetivo</label>
              <select value={form.milestoneId||""} onChange={e=>setForm(f=>({...f,milestoneId:e.target.value||null}))} style={S.sel}>
                  <option value="">Sin objetivo</option>
                  {milestones.filter(m=>!m.closed).map(m=><option key={m.id} value={String(m.id)}>{m.name}</option>)}
                </select>
              </div>
              <div><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Esfuerzo</label>
                <select value={form.effort} onChange={e=>setForm(f=>({...f,effort:+e.target.value}))} style={S.sel}>{EFFORT_PTS.map(p=><option key={p} value={p}>{p} pts</option>)}</select>
              </div>
              <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Avance: {form.progress}%</label><input type="range" min={0} max={100} value={form.progress} onChange={e=>setForm(f=>({...f,progress:+e.target.value}))} style={{width:"100%",marginTop:6,accentColor:BLUE_MID}}/></div>
              <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Notas</label><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={S.inp} placeholder="Opcional"/></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14,alignItems:"center"}}>
              <button onClick={saveTask} disabled={saving} style={{background:saving?"#9ca3af":BLUE_MID,color:"white",border:"none",borderRadius:8,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",minWidth:120}}>{saving?"⏳ Guardando...":editId?"Guardar cambios":"Agregar"}</button>
              <button onClick={()=>{setShowForm(false);setEditId(null);setForm(EMPTY_TASK);}} style={{background:"white",color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 16px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>}

          <div style={{background:"white",borderRadius:16,overflow:"hidden",border:"1px solid #c7d2fe",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:BLUE_DARK,color:"white"}}>
                {["Tarea","Objetivo","Participantes","Categoría","Prioridad","Estado","Esfuerzo","Avance","Deadline",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 12px",fontSize:10,fontWeight:700,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={10} style={{textAlign:"center",color:"#9ca3af",padding:32}}>No hay tareas con estos filtros</td></tr>}
                {filtered.map((t,i)=>{
                  const ms=milestones.find(m=>String(m.id)===String(t.milestoneId));
                  return <tr key={t.id} style={{background:i%2===0?"white":"#f5f3ff",borderBottom:"1px solid #e0e7ff"}}>
                    <td style={{padding:"10px 12px"}}>
                      <div style={{fontWeight:600,color:"#1f2937"}}>{t.name}</div>
                      {t.subtasks.length>0&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{t.subtasks.filter(s=>s.done).length}/{t.subtasks.length} subtareas</div>}
                      {isOverdue(t.deadline,t.status)&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⚠️ Vencido</span>}
                    </td>
                    <td style={{padding:"10px 12px"}}>{ms?<span style={{fontSize:11,background:"#e0e7ff",color:BLUE_DARK,borderRadius:8,padding:"2px 8px",fontWeight:700}}>🎯 {ms.name}</span>:<span style={{fontSize:11,color:"#d1d5db"}}>—</span>}</td>
                    <td style={{padding:"10px 12px"}}><AvatarGroup assignees={t.assignees}/></td>
                    <td style={{padding:"10px 12px"}}><Badge label={t.category} style={CATEGORY_STYLE[t.category]}/></td>
                    <td style={{padding:"10px 12px"}}><Badge label={t.priority} style={PRIORITY_STYLE[t.priority]}/></td>
                    <td style={{padding:"10px 12px"}}><button onClick={()=>cycleStatus(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Badge label={t.status} style={STATUS_STYLE[t.status]}/></button></td>
                    <td style={{padding:"10px 12px",textAlign:"center"}}><span style={{fontSize:12,fontWeight:700,background:"#e0e7ff",color:BLUE_DARK,borderRadius:8,padding:"2px 8px"}}>⚡{t.effort}</span></td>
                    <td style={{padding:"10px 12px"}}>
                      <div style={{width:72}}>
                        <div style={{fontSize:11,color:BLUE_DARK,marginBottom:2,fontWeight:600}}>{t.progress}%</div>
                        <div style={{background:"#e2e8f0",borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,background:t.progress===100?"#059669":t.progress>=50?BLUE_MID:"#f59e0b",width:`${t.progress}%`}}/></div>
                      </div>
                    </td>
                    <td style={{padding:"10px 12px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{t.deadline}</td>
                    <td style={{padding:"10px 12px"}}>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setDetailTask(t)} style={{background:"none",border:"none",color:BLUE_MID,fontSize:12,fontWeight:600,cursor:"pointer"}}>Ver</button>
                        <button onClick={()=>startEdit(t)} style={{background:"none",border:"none",color:"#3b82f6",fontSize:12,fontWeight:600,cursor:"pointer"}}>Editar</button>
                        <button onClick={async()=>{if(window.confirm("¿Eliminar?"))await deleteTask(t.id);}} style={{background:"none",border:"none",color:"#f87171",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕</button>
                      </div>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
          <p style={{fontSize:11,color:BLUE_MID,textAlign:"center",marginTop:8}}>☁️ Sincronizado con Supabase · Clic en estado para cambiarlo</p>
        </>}

        {view==="esfuerzo"&&<EsfuerzoChart tasks={tasks}/>}
        {view==="milestones"&&<MilestonesPanel milestones={milestones} tasks={tasks} onAdd={addMilestone} onToggle={toggleMilestone} onDelete={deleteMilestone}/>}

        {view==="resumen"&&<div style={{background:"white",borderRadius:16,padding:24,border:"1px solid #c7d2fe"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,borderBottom:"1px solid #c7d2fe",paddingBottom:16,marginBottom:20}}>
            <Logo size={52}/>
            <div>
              <h2 style={{margin:0,color:BLUE_DARK,fontSize:20,fontWeight:800}}>Reporte Departamento Eventos</h2>
              <p style={{margin:0,color:BLUE_MID,fontSize:12,fontWeight:700}}>Parque Tempisque</p>
              <p style={{margin:0,color:"#9ca3af",fontSize:12}}>{new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
            {[{l:"Total",v:stats.total,c:BLUE_DARK},{l:"Pendientes",v:stats.pendiente,c:"#64748b"},{l:"En progreso",v:stats.progreso,c:"#2563eb"},{l:"Completados",v:stats.listo,c:"#059669"},{l:"Avance prom.",v:`${stats.avgProgress}%`,c:"#7c3aed"}].map(x=>(
              <div key={x.l} style={{border:"1px solid #c7d2fe",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:24,fontWeight:800,color:x.c}}>{x.v}</div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{x.l}</div>
              </div>
            ))}
          </div>
          {milestones.length>0&&<div style={{marginBottom:16}}>
            <h3 style={{fontSize:13,fontWeight:700,color:BLUE_DARK,marginBottom:8}}>🎯 Estado de objetivos</h3>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {milestones.map(m=>{const mt=tasks.filter(t=>String(t.milestoneId)===String(m.id));const pct=mt.length?Math.round(mt.filter(t=>t.status==="Listo").length/mt.length*100):0;return <span key={m.id} style={{fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20,background:m.closed?"#dcfce7":BLUE_LIGHT,color:m.closed?"#15803d":BLUE_DARK,border:`1px solid ${m.closed?"#86efac":"#c7d2fe"}`}}>{m.closed?"✅ ":""}{m.name} · {pct}%</span>;})}
            </div>
          </div>}
          {stats.vencidos>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"10px 16px",marginBottom:16,color:"#991b1b",fontSize:13}}>⚠️ <b>{stats.vencidos}</b> tarea(s) vencida(s)</div>}
          <EsfuerzoChart tasks={tasks}/>
          {TEAM.map(member=>{
            const mt=tasks.filter(t=>t.assignees.includes(member));
            if(!mt.length)return null;
            return <div key={member} style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${BLUE_LIGHT}`}}>
                <Avatar name={member} size={28}/><h3 style={{margin:0,color:BLUE_DARK,fontSize:15,fontWeight:800}}>{member}</h3><span style={{fontSize:12,color:"#9ca3af"}}>({mt.length} tarea{mt.length>1?"s":""})</span>
              </div>
              {mt.map(t=><div key={t.id} style={{background:BLUE_LIGHT,borderRadius:12,padding:"10px 16px",marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <span style={{fontWeight:600,fontSize:13,color:"#1f2937"}}>{t.name}{isOverdue(t.deadline,t.status)&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700,marginLeft:8}}>⚠️</span>}</span>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <Badge label={t.category} style={CATEGORY_STYLE[t.category]}/>
                    <Badge label={t.priority} style={PRIORITY_STYLE[t.priority]}/>
                    <Badge label={t.status} style={STATUS_STYLE[t.status]}/>
                    <span style={{fontSize:11,background:"#e0e7ff",color:BLUE_DARK,borderRadius:8,padding:"1px 6px",fontWeight:700}}>⚡{t.effort}</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{t.deadline}</span>
                  </div>
                </div>
                <div style={{marginTop:8}}>
                  <div style={{background:"#e0e7ff",borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,background:t.progress===100?"#059669":t.progress>=50?BLUE_MID:"#f59e0b",width:`${t.progress}%`}}/></div>
                  <p style={{textAlign:"right",fontSize:11,color:BLUE_MID,margin:"3px 0 0"}}>{t.progress}%</p>
                </div>
              </div>)}
            </div>;
          })}
        </div>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
